<!DOCTYPE html>
<html>
    <head>
        <title>Profile card</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
      <style>
        *{
            padding:0;
            margin:0;
            box-sizing: border-box;
        }
        body{
            height:100vh;
            width:100vw;
            background-color: gainsboro;
             display: flex;
    justify-content: center;
    align-items: center;


        }
        .container{
           
            display:flex;
            justify-content: center;
            align-items:center;
            gap:10px;
            padding:20px;

        }

        .box{
            height:500px;
            width:500px;
            display:flex;
            flex-direction: column;
            
            align-items:center;
            gap:10px;
            background-color: white;
            padding:20px;
           
             
            border-radius: 20px;

        }
        .navbar{
            background-color: blueviolet;
            height:200px;
            width:100%;
            display:flex;
            justify-content: center;
            align-items:center;
            

          


        }
        ul{
            list-style: none;
            
        
        }

        #list1{
            font-size: 30px;
            font-weight: bold;
            text-align:center;
            

            
        }
         #list2{
            font-size:24px;
            font-weight: normal;
        }
        .profile-img{
            border-radius: 50%;
            width: 120px;
            height: 120px;
            border: 3px solid white;
          
            
        }
        .icon{
            display: flex;             
    justify-content: center;    
    gap: 25px;                  
    margin-top: 10px;  
        }
         .icon a i{
            font-size: 28px;
            color:blueviolet;
            
        
        
         }
         .btn{
            display:flex;
            justify-content:center;
           
            gap:25px;
           
           
         }
         button{
            border-radius: 20px;
            width:80px;
            height:30px;
            background-color: blueviolet;
            color:white;

           
         }
         .ic{
            display:flex;
            justify-content:center;
            gap:25px;
            margin-top: 20px;
            
         }
         .ic a{
            color:black;
            font-weight: normal;
         }
        
        
      </style>
    </head>
    <body>
        <div class="container">
            <div class="box">
                <div class="navbar">
                    <img src="https://tse1.mm.bing.net/th/id/OIP.i-h_R_qJwqd5B1JF-0NEjwHaE8?pid=Api&rs=1&c=1&qlt=95&w=173&h=115" alt="Profile Picture" class="profile-img">

                </div>
                <br>
                <ul>
                    <li id="list1">codingLab</li>
                    <br>
                    <li id="list2">youTuber & Blogger</li>
                 

                    
                </ul>
                <div class="icon">
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
                </div>
                <div class="btn">
                    <button>Subscribe</button>
                <button>message</button>
                </div>
                <div class="ic">
                    <a href="#"><i class="fas fa-thumbs-up">60k</i></a>
                    <a href="#"><i class="fas fa-comment">20k</i></a>
                    <a href="#"><i class="fas fa-share">12k</i></a>
                </div>
                

            </div>
        </div>
        <script></script>
    </body>
</html>
